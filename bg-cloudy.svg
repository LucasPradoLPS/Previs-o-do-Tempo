<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 2600" preserveAspectRatio="xMidYMid slice">
  <defs>
    <linearGradient id="skyCloudy" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#374a5c"/>
      <stop offset="40%" stop-color="#57697d"/>
      <stop offset="75%" stop-color="#7f8fa0"/>
      <stop offset="100%" stop-color="#a3b0bd"/>
    </linearGradient>
    <filter id="softenC" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="30"/>
    </filter>
    <filter id="softenRain" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="6"/>
    </filter>
  </defs>

  <rect x="0" y="0" width="1200" height="2600" fill="url(#skyCloudy)"/>

  <g filter="url(#softenC)" fill="#c7d0da">
    <ellipse cx="300" cy="420" rx="380" ry="110" opacity="0.6"/>
    <ellipse cx="850" cy="360" rx="340" ry="100" opacity="0.55"/>
    <ellipse cx="150" cy="700" rx="320" ry="90" opacity="0.45"/>
    <ellipse cx="950" cy="700" rx="380" ry="100" opacity="0.4"/>
    <ellipse cx="500" cy="900" rx="420" ry="110" opacity="0.4"/>
  </g>

  <g filter="url(#softenC)" fill="#4f5c69">
    <ellipse cx="250" cy="500" rx="300" ry="80" opacity="0.5"/>
    <ellipse cx="900" cy="480" rx="320" ry="85" opacity="0.45"/>
    <ellipse cx="550" cy="1000" rx="400" ry="90" opacity="0.35"/>
  </g>

  <g filter="url(#softenC)" fill="#8a97a5">
    <ellipse cx="200" cy="1300" rx="360" ry="90" opacity="0.3"/>
    <ellipse cx="850" cy="1450" rx="400" ry="100" opacity="0.28"/>
    <ellipse cx="480" cy="1700" rx="420" ry="100" opacity="0.24"/>
    <ellipse cx="900" cy="1950" rx="380" ry="95" opacity="0.2"/>
    <ellipse cx="250" cy="2100" rx="360" ry="90" opacity="0.2"/>
  </g>

  <g filter="url(#softenRain)" stroke="#dbe6f0" stroke-width="5" stroke-linecap="round" opacity="0.35">
    <line x1="150" y1="1500" x2="90" y2="1680"/>
    <line x1="320" y1="1550" x2="260" y2="1730"/>
    <line x1="520" y1="1520" x2="460" y2="1700"/>
    <line x1="700" y1="1560" x2="640" y2="1740"/>
    <line x1="880" y1="1530" x2="820" y2="1710"/>
    <line x1="1050" y1="1560" x2="990" y2="1740"/>
  </g>

  <rect x="0" y="2200" width="1200" height="400" fill="#2b3540" opacity="0.2"/>
</svg>
