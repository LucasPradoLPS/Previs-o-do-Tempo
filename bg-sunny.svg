<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 2600" preserveAspectRatio="xMidYMid slice">
  <defs>
    <linearGradient id="skySunny" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#1c66b8"/>
      <stop offset="35%" stop-color="#3a8bd6"/>
      <stop offset="60%" stop-color="#79b9ee"/>
      <stop offset="100%" stop-color="#bcdcf6"/>
    </linearGradient>
    <radialGradient id="sunHalo" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#ffffff" stop-opacity="1"/>
      <stop offset="18%" stop-color="#fffceb" stop-opacity="0.95"/>
      <stop offset="45%" stop-color="#fff2b8" stop-opacity="0.55"/>
      <stop offset="100%" stop-color="#fff2b8" stop-opacity="0"/>
    </radialGradient>
    <filter id="soften" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="26"/>
    </filter>
    <filter id="softenLight" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="10"/>
    </filter>
  </defs>

  <rect x="0" y="0" width="1200" height="2600" fill="url(#skySunny)"/>

  <circle cx="620" cy="520" r="720" fill="url(#sunHalo)"/>
  <circle cx="620" cy="520" r="140" fill="#ffffff"/>

  <g filter="url(#softenLight)" opacity="0.55">
    <rect x="-100" y="470" width="1450" height="18" fill="#ffffff" transform="rotate(-8 620 520)"/>
    <rect x="-100" y="560" width="1450" height="10" fill="#ffffff" transform="rotate(6 620 520)"/>
  </g>

  <g filter="url(#soften)" fill="#ffffff">
    <ellipse cx="260" cy="760" rx="260" ry="70" opacity="0.5"/>
    <ellipse cx="120" cy="820" rx="180" ry="50" opacity="0.4"/>
    <ellipse cx="960" cy="900" rx="300" ry="80" opacity="0.4"/>
    <ellipse cx="1080" cy="960" rx="200" ry="55" opacity="0.35"/>
    <ellipse cx="450" cy="1050" rx="340" ry="60" opacity="0.3"/>
    <ellipse cx="150" cy="1400" rx="320" ry="70" opacity="0.28"/>
    <ellipse cx="900" cy="1500" rx="360" ry="80" opacity="0.25"/>
    <ellipse cx="500" cy="1750" rx="400" ry="90" opacity="0.22"/>
    <ellipse cx="950" cy="2000" rx="380" ry="90" opacity="0.2"/>
    <ellipse cx="250" cy="2100" rx="350" ry="85" opacity="0.2"/>
  </g>

  <rect x="0" y="2200" width="1200" height="400" fill="#bcdcf6" opacity="0.15"/>
</svg>
